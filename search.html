<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>/* 与首页风格一致的搜索框 */
.search-card {
    width: 1200px;       /* 修正尺寸单位 */
    height: 50px;       /* 标准输入框高度 */
    margin: 20px auto;  /* 与.hero-card保持相同外边距逻辑 */
    display: flex;
    align-items: center;
    background: #FFFFFF;
    border-radius: 4px;  /* 与.gallery-grid的gap值比例协调 */
    border: 1px solid #ddd; /* 与.exhibit-card边框一致 */
}

.search-input {
    flex: 1;
    height: 100%;
    padding: 0 15px;
    border: none;
    outline: none;
    font-size: 1rem;     /* 与.nav-item字体比例协调 */
    font-family: '宋体', SimSun, serif; /* 继承首页字体 */
    color: #333;        /* 与正文文本颜色匹配 */
}

.search-button {
    width: 50px;        /* 固定按钮宽度 */
    height: 100%;
    border: none;
    background: #8b5a2b; /* 使用导航栏主色 */
    cursor: pointer;
    transition: background-color 0.3s; /* 与.nav-item过渡效果同步 */
}

.search-button:hover {
    background-color: #6d4420; /* 主色加深版 */
}

.search-icon {
    width: 24px;        /* 标准图标尺寸 */
    height: 24px;
    filter: brightness(0) invert(1); /* 反白显示图标 */
}</style>
</head>
<body>
<div class="search-card">
  <input type="text" class="search-input" placeholder="请输入搜索内容...">
  <button class="search-button">
    <img src="search-icon.png" alt="搜索" class="search-icon">
  </button>
</div>
<script>
// 基础搜索逻辑（与首页交互模式一致）
document.querySelector('.search-button').addEventListener('click', () => {
    const input = document.querySelector('.search-input');
    const keyword = input.value.trim();

    if (keyword) {
        // 执行搜索操作
        console.log('搜索关键词:', keyword);
        // window.location.href = `/search?q=${encodeURIComponent(keyword)}`;
    }
});

// 回车键支持（与首页交互习惯一致）
document.querySelector('.search-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        document.querySelector('.search-button').click();
    }
});
</script>
</body>
</html>

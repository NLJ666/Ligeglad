<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIGC文博元宇宙</title>
    <style>
        :root {
            --nav-width: 1680px;
            --main-card-size: 1280px 2000px;
            --hover-color: #e74c3c;
            --primary-color: #8b5a2b;
            --secondary-color: #f4e7d3;
            font-family: '宋体', SimSun, serif;
            background-color: #8b5a2b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: '宋体', SimSun, serif;
            background-color: #f9f6f0;
        }

        .nav-container {
            width: var(--nav-width);
            margin: 0 auto;
            padding: 1rem 0;
            background: var(--primary-color);
        }

        .nav-list {
            display: flex;
            list-style: none;
            justify-content: center;
            gap: 90px;
        }

        .nav-item a {
            color: #f9f6f0;
            text-decoration: none;
            font-size: 1.2rem;
            transition: color 0.3s;
        }

        .nav-item a:hover {
            color: var(--hover-color);
        }

        .hero-card {
            width: 1480px;
            height: 500px;
            margin: 2rem auto;
            position: relative;
            overflow: hidden;
        }

        .slide-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 1s;
        }

        .gallery-grid {
            width: var(--nav-width);
            margin: 3rem auto;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
        }

        .exhibit-card {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border: 1px solid #ddd;
            padding: 1rem;
        }

        .search-card {
            width: 1200px;
            height: 50px;
            margin: 20px auto;
            display: flex;
            align-items: center;
            background: #FFFFFF;
            border-radius: 4px;
            border: 1px solid #ddd;
        }

        .search-input {
            flex: 1;
            height: 100%;
            padding: 0 15px;
            border: none;
            outline: none;
            font-size: 1rem;
            font-family: '宋体', SimSun, serif;
            color: #333;
        }

        .search-button {
            width: 50px;
            height: 100%;
            border: none;
            background: #8b5a2b;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .search-button:hover {
            background-color: #6d4420;
        }

        .search-icon {
            width: 24px;
            height: 24px;
            filter: brightness(0) invert(1);
        }

        .model-container {
            width: 100%;
            height: 300px;
            background: #f5f5f5;
            position: relative;
        }

        .threejs-canvas {
            width: 100%;
            height: 100%;
            touch-action: none;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="nav-container">
        <ul class="nav-list">
            <li class="nav-item"><a href="index.html">首页</a></li>
            <li class="nav-item"><a href="bronze.html">青铜器</a></li>
            <li class="nav-item"><a href="oracle.html">甲骨文</a></li>
            <li class="nav-item"><a href="porcelain.html">瓷器</a></li>
            <li class="nav-item"><a href="mural.html">壁画</a></li>
            <li class="nav-item"><a href="#digital-human">数字人</a></li>
        </ul>
    </nav>

    <!-- 搜索框 -->
    <div class="search-card">
        <input type="text" class="search-input" placeholder="请输入搜索内容...">
        <button class="search-button">
            <img src="search-icon.png" alt="搜索" class="search-icon">
        </button>
    </div>

    <!-- 封面图 -->
    <section class="hero-card">
        <img src="D:\服创总文件夹\Service_competition_0309\webcode\Image_footage\cover_page01.jpg" class="slide-image" alt id="cover1">
    </section>

    <!-- 文物展示区域 -->
    <main class="gallery-grid" id="gallery-grid">
        <!-- 文物卡片将动态插入到这里 -->
    </main>

    <!-- Three.js 库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/loaders/FBXLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/loaders/GLTFLoader.js"></script>

    <!-- 动态加载数据和初始化模型查看器 -->
    <script>
        // 动态加载文物数据
        document.addEventListener('DOMContentLoaded', () => {
            fetch('http://localhost:3000/api/artifacts')
                .then(response => response.json())
                .then(data => {
                    const galleryGrid = document.getElementById('gallery-grid');
                    data.forEach(artifact => {
                        const card = document.createElement('article');
                        card.className = 'exhibit-card';
                        card.innerHTML = `
                            <div class="model-container">
                                <canvas class="threejs-canvas" data-model="${artifact.model_path}"></canvas>
                            </div>
                            <div class="card-content">
                                <h3>${artifact.name}</h3><br>
                                <p>${artifact.description}</p>
                            </div>
                        `;
                        galleryGrid.appendChild(card);

                        // 初始化Three.js模型查看器
                        new UniversalModelViewer(card.querySelector('.threejs-canvas'));
                    });
                })
                .catch(error => {
                    console.error('获取数据失败:', error);
                });
        });

        // Three.js 模型查看器
        class UniversalModelViewer {
            constructor(canvasElement) {
                if (!canvasElement.dataset.model) {
                    console.error('未指定模型路径');
                    return;
                }

                this.canvas = canvasElement;
                this.modelPath = canvasElement.dataset.model;
                this.format = this.detectFormat();
                this.isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

                this.initThree();
            }

            detectFormat() {
                const ext = this.modelPath.split('.').pop().toLowerCase();
                return ['glb', 'gltf'].includes(ext) ? 'glb' : ext;
            }

            initThree() {
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(
                    45,
                    this.canvas.clientWidth / this.canvas.clientHeight,
                    0.1,
                    1000
                );

                this.renderer = new THREE.WebGLRenderer({
                    canvas: this.canvas,
                    antialias: true,
                    alpha: true
                });
                this.renderer.setPixelRatio(window.devicePixelRatio);

                this.initLights();
                this.loadModel();
            }

            initLights() {
                const ambient = new THREE.AmbientLight(0xffffff, 0.8);
                const directional = new THREE.DirectionalLight(0xffffff, 1);
                directional.position.set(5, 5, 5);
                this.scene.add(ambient, directional);
            }

            loadModel() {
                let loader;
                switch (this.format) {
                    case 'fbx':
                        loader = new THREE.FBXLoader();
                        break;
                    case 'glb':
                    case 'gltf':
                        loader = new THREE.GLTFLoader();
                        break;
                    default:
                        console.error('不支持的格式:', this.format);
                        return;
                }

                loader.load(
                    this.modelPath,
                    (model) => this.onModelLoaded(model),
                    (xhr) => console.log(`加载进度: ${(xhr.loaded / xhr.total * 100).toFixed(1)}%`),
                    (error) => {
                        console.error('模型加载失败:', error);
                        this.showErrorFallback();
                    }
                );
            }

            onModelLoaded(model) {
                const model3D = this.format === 'glb' ? model.scene : model;

                model3D.traverse(child => {
                    if (child.isMesh) {
                        if (this.format === 'glb') {
                            child.material.metalness = 0.5;
                            child.material.roughness = 0.6;
                        } else {
                            child.material = new THREE.MeshStandardMaterial({
                                map: child.material.map,
                                metalness: 0.4,
                                roughness: 0.5
                            });
                        }
                    }
                });

                const box = new THREE.Box3().setFromObject(model3D);
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = (this.canvas.dataset.scale || 1) / maxDim;

                model3D.scale.set(scale, scale, scale);
                this.scene.add(model3D);

                const center = box.getCenter(new THREE.Vector3());
                this.camera.position.set(center.x, center.y, center.z + maxDim * 1.5);
                this.camera.lookAt(center);

                if (model.animations?.length > 0) {
                    this.mixer = new THREE.AnimationMixer(model3D);
                    this.mixer.clipAction(model.animations[0]).play();
                }

                this.animate();
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                if (this.mixer) this.mixer.update(0.016);
                this.renderer.render(this.scene, this.camera);
            }

            showErrorFallback() {
                this.canvas.parentElement.innerHTML = `
                    <div class="model-error">
                        <img src="./assets/error-icon.svg" alt="加载失败">
                        <p>文物模型暂时无法呈现</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
